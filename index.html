<title>Turf Tank Ops — OC Parks</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0c0f14;
  --bg-card: #141820;
  --bg-card-hover: #1a2030;
  --bg-input: #0e1118;
  --border: #1e2636;
  --border-active: #2a3a5c;
  --text-primary: #e8ecf4;
  --text-secondary: #7a8599;
  --text-muted: #4a5568;
  --accent-orange: #f97316;
  --accent-orange-dim: #c2590f;
  --accent-blue: #3b82f6;
  --accent-green: #22c55e;
  --accent-red: #ef4444;
  --accent-yellow: #eab308;
  --accent-purple: #a855f7;
  --truck1: #f97316;
  --truck2: #3b82f6;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'DM Sans', -apple-system, sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { font-size: 15px; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── NAV BAR ── */
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(12,15,20,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; align-items: center;
  padding: 6px 4px calc(6px + var(--safe-bottom));
  z-index: 100;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: var(--text-muted);
  font: 500 9px var(--font-sans);
  padding: 6px 4px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  min-width: 48px;
}
.nav-btn.active { color: var(--accent-orange); }
.nav-btn.active .nav-icon { background: rgba(249,115,22,0.12); }
.nav-icon {
  width: 32px; height: 32px; display: flex; align-items: center;
  justify-content: center; border-radius: 8px; transition: all 0.2s;
  font-size: 16px;
}

/* ── HEADER ── */
.app-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(12,15,20,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
}
.header-top { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 36px; height: 36px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent-orange), #ea580c);
  display: flex; align-items: center; justify-content: center;
  font: 700 14px var(--font-mono); color: #fff;
  flex-shrink: 0;
}
.header-title {
  font: 700 17px var(--font-sans); color: var(--text-primary);
  letter-spacing: -0.3px;
}
.header-sub {
  font: 500 11px var(--font-sans); color: var(--text-secondary);
  margin-top: -1px;
}

/* ── SEARCH ── */
.search-wrap {
  margin: 10px 16px 0;
  position: relative;
}
.search-input {
  width: 100%; padding: 10px 12px 10px 36px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-primary);
  font: 400 14px var(--font-sans); outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent-orange); }
.search-input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px; pointer-events: none;
}

/* ── CONTENT ── */
.content {
  padding: 12px 12px calc(80px + var(--safe-bottom));
  max-width: 800px; margin: 0 auto;
}

/* ── CARDS ── */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 8px;
  overflow: hidden; transition: all 0.15s;
}
.card:active { transform: scale(0.99); }
.card-header {
  padding: 12px 14px; display: flex; align-items: center;
  justify-content: space-between; cursor: pointer;
}
.card-title {
  font: 600 14px var(--font-sans); color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}
.card-badge {
  font: 600 10px var(--font-mono); padding: 2px 7px;
  border-radius: 4px; letter-spacing: 0.5px;
}
.badge-t1 { background: rgba(249,115,22,0.15); color: var(--truck1); }
.badge-t2 { background: rgba(59,130,246,0.15); color: var(--truck2); }
.badge-count {
  font: 600 11px var(--font-mono); color: var(--text-muted);
  background: rgba(255,255,255,0.04); padding: 2px 6px;
  border-radius: 4px;
}
.card-body { padding: 0 14px 14px; }
.card-chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 12px; }
.card-chevron.open { transform: rotate(90deg); }

/* ── DATA ROWS ── */
.data-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 13px;
}
.data-row:last-child { border-bottom: none; }
.data-label { color: var(--text-secondary); flex: 1; }
.data-value { color: var(--text-primary); font-weight: 500; text-align: right; flex: 1; }
.data-value.mono { font-family: var(--font-mono); font-size: 12px; }

/* ── COLOR DOT ── */
.color-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; margin-right: 6px; vertical-align: middle;
  border: 1px solid rgba(255,255,255,0.1);
}
.color-dot.white { background: #f1f5f9; }
.color-dot.red { background: #ef4444; }
.color-dot.blue { background: #3b82f6; }
.color-dot.yellow { background: #eab308; }

/* ── GPS BUTTON ── */
.gps-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2);
  color: var(--accent-green); padding: 6px 12px; border-radius: var(--radius-sm);
  font: 500 12px var(--font-sans); cursor: pointer;
  text-decoration: none; transition: all 0.15s;
}
.gps-btn:hover { background: rgba(34,197,94,0.18); }
.gps-btn:active { transform: scale(0.97); }

/* ── SECTION TITLE ── */
.section-title {
  font: 700 13px var(--font-mono); color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1.2px;
  padding: 16px 4px 8px; display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, var(--border), transparent);
}

/* ── ROUTE TIMELINE ── */
.route-day {
  display: flex; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.route-day:last-child { border-bottom: none; }
.route-day-name {
  font: 700 12px var(--font-mono); color: var(--accent-orange);
  min-width: 36px; padding-top: 1px;
}
.route-day-name.t2 { color: var(--accent-blue); }
.route-detail { flex: 1; }
.route-sites { font: 600 13px var(--font-sans); color: var(--text-primary); }
.route-region { font: 400 11px var(--font-sans); color: var(--text-secondary); margin-top: 2px; }
.route-fields { font: 400 12px var(--font-sans); color: var(--text-muted); margin-top: 3px; }

/* ── TRUCK TOGGLE ── */
.truck-toggle {
  display: flex; background: var(--bg-input); border-radius: var(--radius);
  padding: 3px; gap: 3px; margin-bottom: 12px;
  border: 1px solid var(--border);
}
.truck-toggle-btn {
  flex: 1; padding: 8px; border: none; border-radius: 7px;
  font: 600 12px var(--font-sans); cursor: pointer;
  background: transparent; color: var(--text-muted); transition: all 0.2s;
}
.truck-toggle-btn.active-t1 { background: rgba(249,115,22,0.15); color: var(--truck1); }
.truck-toggle-btn.active-t2 { background: rgba(59,130,246,0.15); color: var(--truck2); }

/* ── INVENTORY TABLE ── */
.inv-table { width: 100%; }
.inv-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 13px;
}
.inv-row:last-child { border-bottom: none; }
.inv-item { color: var(--text-primary); flex: 1; }
.inv-qty {
  font: 600 13px var(--font-mono); color: var(--accent-green);
  min-width: 40px; text-align: right;
}
.inv-qty.none { color: var(--text-muted); }

/* ── SUPPLY STATUS ── */
.supply-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  margin-bottom: 6px;
}
.supply-name { font: 600 14px var(--font-sans); color: var(--text-primary); }
.supply-meta {
  display: flex; gap: 16px; margin-top: 6px;
  font: 400 12px var(--font-sans); color: var(--text-secondary);
}

/* ── STATION CARD ── */
.station-group {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
}
.station-group-header {
  padding: 12px 14px; display: flex; align-items: center;
  justify-content: space-between;
}
.station-group-name { font: 600 14px var(--font-sans); color: var(--text-primary); }
.station-point {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-top: 1px solid rgba(255,255,255,0.03);
}
.station-coords {
  font: 400 12px var(--font-mono); color: var(--text-secondary);
}
.station-note {
  font: 400 11px var(--font-sans); color: var(--text-muted);
  margin-top: 2px;
}

/* ── CONTACT CARD ── */
.contact-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
}
.contact-site { font: 600 14px var(--font-sans); color: var(--text-primary); }
.contact-info { margin-top: 8px; font-size: 13px; }
.contact-info a { color: var(--accent-blue); text-decoration: none; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-muted); font-size: 14px;
}
.empty-state .icon { font-size: 32px; margin-bottom: 8px; display: block; }

/* ── TAB PILLS ── */
.tab-pills {
  display: flex; gap: 6px; overflow-x: auto; padding: 0 4px 8px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.tab-pills::-webkit-scrollbar { display: none; }
.tab-pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); font: 500 12px var(--font-sans);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.tab-pill.active {
  background: rgba(249,115,22,0.12); border-color: rgba(249,115,22,0.3);
  color: var(--accent-orange);
}

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.25s ease-out; }

/* ── DESKTOP ── */
@media (min-width: 640px) {
  .content { padding: 16px 24px calc(80px + var(--safe-bottom)); }
  .nav-bar { max-width: 480px; left: 50%; transform: translateX(-50%); bottom: 12px; border-radius: 16px; border: 1px solid var(--border); }
}
</style>
</head>

function ColorDot({color}) {
  const c = (color||'').toLowerCase();
  return <span className={`color-dot ${c}`}/>;
}

// ── Fields View ──
function FieldsView({search}) {
  const [selectedSite, setSelectedSite] = useState(null);
  const sites = useMemo(() => {
    const map = {};
    FIELDS.forEach(f => {
      if (!map[f.site]) map[f.site] = [];
      map[f.site].push(f);
    });
    return Object.entries(map);
  }, []);

  const filtered = useMemo(() => {
    if (!search) return sites;
    const q = search.toLowerCase();
    return sites.filter(([name, fields]) =>
      name.toLowerCase().includes(q) ||
      fields.some(f => f.field.toLowerCase().includes(q) || (f.color||'').toLowerCase().includes(q))
    );
  }, [sites, search]);

  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 4px 4px'}}>
        <div className="section-title" style={{padding:0}}>
          {filtered.length} Sites — {filtered.reduce((n,[,f])=>n+f.length,0)} Fields
        </div>
        <span style={{background:'rgba(34,197,94,0.12)',border:'1px solid rgba(34,197,94,0.25)',color:'var(--accent-green)',padding:'4px 12px',borderRadius:'20px',font:'600 11px var(--font-mono)',letterSpacing:'0.5px'}}>WEEKLY</span>
      </div>
      {filtered.map(([site, fields]) => (
        <div className="card" key={site}>
          <div className="card-header" onClick={()=>setSelectedSite(selectedSite===site?null:site)}>
            <div className="card-title">
              {site}
              <span className="badge-count">{fields.length}</span>
            </div>
            <span className={`card-chevron ${selectedSite===site?'open':''}`}><Icon name="chevron" size={14}/></span>
          </div>
          {selectedSite===site && (
            <div className="card-body fade-in">
              {fields.map((f,i) => (
                <div key={i} style={{padding:'7px 0',borderBottom:'1px solid rgba(255,255,255,0.03)'}}>
                  <div className="data-row" style={{borderBottom:'none',padding:0}}>
                    <span className="data-label">
                      <ColorDot color={f.color}/>{f.field}
                    </span>
                    <span className="data-value" style={{fontSize:'12px',color:'var(--text-secondary)'}}>
                      {f.dimensions || '—'}
                    </span>
                  </div>
                  {(f.whoPaints || f.notes) && (
                    <div style={{marginTop:'3px',marginLeft:'16px',fontSize:'11px',display:'flex',gap:'10px'}}>
                      {f.notes && <span style={{color:'var(--accent-yellow)'}}>{f.notes}</span>}
                      {f.whoPaints && <span style={{color:'var(--accent-purple)',fontStyle:'italic'}}>{f.whoPaints}</span>}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── Base Stations View ──
function StationsView({search}) {
  const grouped = useMemo(() => {
    const map = {};
    STATIONS.forEach(s => {
      if (!map[s.site]) map[s.site] = [];
      map[s.site].push(s);
    });
    return Object.entries(map);
  }, []);

  const filtered = useMemo(() => {
    if (!search) return grouped;
    const q = search.toLowerCase();
    return grouped.filter(([name]) => name.toLowerCase().includes(q));
  }, [grouped, search]);

  const openMaps = (lat, lng, name) => {
    const url = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
    window.open(url, '_blank');
  };

  return (
    <div className="fade-in">
      <div className="section-title">{STATIONS.length} Base Station Points</div>
      {filtered.map(([site, points]) => (
        <div className="station-group" key={site}>
          <div className="station-group-header">
            <span className="station-group-name">{site}</span>
            <span className="badge-count">{points.length} pt{points.length>1?'s':''}</span>
          </div>
          {points.map((pt, i) => (
            <div className="station-point" key={i}>
              <div>
                <div className="station-coords">{pt.lat.toFixed(6)}, {pt.lng.toFixed(6)}</div>
                {pt.notes && <div className="station-note">{pt.notes}</div>}
              </div>
              <a className="gps-btn" onClick={()=>openMaps(pt.lat,pt.lng,site)} href="#">
                <Icon name="navigate" size={14}/> Navigate
              </a>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ── Contacts View ──
function ContactsView({search}) {
  const filtered = useMemo(() => {
    if (!search) return CONTACTS;
    const q = search.toLowerCase();
    return CONTACTS.filter(c => c.site.toLowerCase().includes(q));
  }, [search]);

  return (
    <div className="fade-in">
      <div className="section-title">{filtered.length} Site Contacts</div>
      {filtered.map((c,i) => (
        <div className="contact-card" key={i}>
          <div className="contact-site">{c.site}</div>
          <div className="contact-info">

}

// ════════════════════════════════════════════════════
// APP
// ════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState('fields');
  const [search, setSearch] = useState('');

  const tabs = [
    {id:'fields', label:'Fields', icon:'fields'},
    {id:'routes', label:'Routes', icon:'routes'},
    {id:'gps', label:'GPS', icon:'gps'},
    {id:'inventory', label:'Trucks', icon:'truck'},
    {id:'supplies', label:'Supplies', icon:'supplies'},
    {id:'contacts', label:'Contacts', icon:'contacts'},
  ];

  return (
    <>
      <div className="app-header">
        <div className="header-top">
          <div className="header-logo">TT</div>
          <div>
            <div className="header-title">Turf Tank Ops</div>
            <div className="header-sub">Orange County Parks & Recreation</div>
          </div>
        </div>
        {(tab==='fields'||tab==='gps'||tab==='contacts') && (
          <div className="search-wrap" style={{margin:'10px 0 0'}}>
            <span className="search-icon"><Icon name="search" size={14}/></span>
            <input
              className="search-input"
              placeholder={`Search ${tab==='fields'?'fields & sites':tab==='gps'?'base stations':'contacts'}...`}
              value={search} onChange={e=>setSearch(e.target.value)}
            />
          </div>
        )}
      </div>

      <div className="content">
        {tab==='fields' && <FieldsView search={search}/>}
        {tab==='routes' && <RoutesView/>}
        {tab==='gps' && <StationsView search={search}/>}
        {tab==='inventory' && <InventoryView/>}
        {tab==='supplies' && <SuppliesView/>}
        {tab==='contacts' && <ContactsView search={search}/>}
      </div>

      <nav className="nav-bar">
        {tabs.map(t => (
          <button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`}
            onClick={()=>{setTab(t.id);setSearch('');}}>
            <span className="nav-icon"><Icon name={t.icon} size={18}/></span>
            {t.label}
          </button>
        ))}
      </nav>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
